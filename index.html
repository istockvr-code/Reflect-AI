// ---------------------------------------------------------------------------
// ARCHITECTURE NOTE (not implemented in this prototype — UI only)
//
// On-device pipeline:
// 1. Hub idles with a lightweight voice-activity-detection (VAD) model running
//    continuously on raw audio, locally, with no storage or network calls.
// 2. When VAD detects a sustained audio change (speech onset), the hub starts
//    a recording segment.
// 3. The segment is transcribed locally; only the transcript + emotion tags
//    are stored/sent for analysis — raw audio for that segment is then
//    discarded.
// 4. Recording stops after a period of silence, returning the hub to idle/VAD
//    mode.
// This keeps storage and AI token usage proportional to actual conversation
// time, not 24/7 raw capture.
// ---------------------------------------------------------------------------

// ---------------------------------------------------------------------------
// STORAGE HELPERS
// ---------------------------------------------------------------------------

function loadConversations() {
  try { return JSON.parse(localStorage.getItem("reflect_conversations") || "[]"); }
  catch { return []; }
}

function saveConversations(convs) {
  try { localStorage.setItem("reflect_conversations", JSON.stringify(convs)); }
  catch {}
}

function makeConversation(transcript, deviceName) {
  const text = transcript.trim();
  if (!text) return null;
  const words = text.split(/\s+/);
  const title = words.slice(0, 6).join(" ") + (words.length > 6 ? "..." : "");
  const now = new Date();
  const dateStr = now.toLocaleString("en-US", { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  // Simple tone detection from keywords
  const lower = text.toLowerCase();
  const tone = /angry|upset|frustrat|annoyed|stressed|tense/.test(lower) ? "tense"
    : /happy|great|love|wonderful|excited|amazing/.test(lower) ? "warm"
    : /calm|relax|peace|quiet|good|fine/.test(lower) ? "calm"
    : "calm";
  return {
    id: now.getTime(),
    title,
    date: dateStr,
    room: deviceName || "Phone Microphone",
    theme: "recorded",
    tone,
    snippet: "..." + text.slice(0, 140),
    transcript: text,
  };
}

function BluetoothPanel({ onClose, onConnect }) {
  const [foundIds, setFoundIds] = useState([]);
  const [scanning, setScanning] = useState(true);
  const [micStatus, setMicStatus] = useState("idle"); // idle | requesting | denied

  React.useEffect(() => {
    const timers = SCAN_DEVICES.map((d) =>
      setTimeout(() => setFoundIds((prev) => [...prev, d.id]), d.delay)
    );
    const doneTimer = setTimeout(() => setScanning(false), 4400);
    return () => { timers.forEach(clearTimeout); clearTimeout(doneTimer); };
  }, []);

  const found = SCAN_DEVICES.filter((d) => foundIds.includes(d.id));

  const handlePhoneConnect = async () => {
    setMicStatus("requesting");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      // Keep the stream alive so permission stays granted, then connect
      stream.getTracks().forEach((t) => t.stop());
      onConnect({ id: "this-phone", name: "This phone's microphone", kind: "phone", isPhone: true });
    } catch (err) {
      setMicStatus("denied");
    }
  };

    <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.65)", backdropFilter: "blur(4px)", padding: "16px" }}>

        </button>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "4px" }}>
          <Icon.Bluetooth2 style={{
            width: 16, height: 16, color: "#9B7FE0",
            animation: scanning ? "iconPulse 1.4s ease-in-out infinite" : "none",
          }} />
          <span style={{ fontSize: "12px", fontWeight: 500, letterSpacing: "0.2em", color: "#9B7FE0", textTransform: "uppercase" }}>Bluetooth</span>
        </div>
        <h2 style={{ fontSize: "20px", fontWeight: 600, color: "#FFFFFF", margin: "8px 0 4px" }}>
          {scanning ? "Searching for devices" : "Nearby devices"}
        </h2>
        <p style={{ fontSize: "13px", color: "#8478A0", margin: "0 0 16px", lineHeight: 1.5 }}>
          Recording needs a paired microphone. Any Bluetooth audio device works, or pair a
          Reflect Mic for the best experience.
        </p>

        <button onClick={handlePhoneConnect} disabled={micStatus === "requesting"} style={{
          width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
          borderRadius: "14px", border: "1px solid rgba(155,127,224,0.4)", background: "rgba(155,127,224,0.1)",
          padding: "14px 16px", color: "#F3EEFF", fontSize: "14px", cursor: micStatus === "requesting" ? "default" : "pointer",
          fontFamily: "inherit", textAlign: "left", marginBottom: micStatus === "denied" ? "8px" : "16px",
          boxShadow: "0 0 20px rgba(155,127,224,0.12)",
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
            <Icon.Smartphone style={{ width: 18, height: 18, color: "#C9A8F0" }} />
            <div style={{ display: "flex", flexDirection: "column", gap: "2px" }}>
              <span>Use this phone's microphone</span>
              <span style={{ fontSize: "11px", color: "#8478A0" }}>
                {micStatus === "requesting" ? "Requesting mic access..." : "Tap to request mic permission"}
              </span>
            </div>
          </div>
          <span style={{ fontSize: "12px", color: "#9B7FE0" }}>
            {micStatus === "requesting" ? "..." : "Connect"}
          </span>
        </button>
        {micStatus === "denied" && (
          <p style={{ fontSize: "12px", color: "#E08B6E", marginBottom: "16px", lineHeight: 1.5 }}>

  );

const MOCK_REPLIES = [
  "Looking back at last week, finances came up twice and both times the conversation ended with a plan to revisit the numbers together. That seems to be a pattern worth noticing.",
  "Evenings after 9 PM tend to be when conversations land more gently — Tuesday's wind-down chat is a good example of that.",
  "I don't see that topic come up directly in recent conversations. Want me to look further back?",
];

function AskQuestionPanel({ onClose, conversations }) {
  const [messages, setMessages] = useState([
    { from: "ai", text: "Hi, I'm Clarity. Ask me anything about your past conversations and I'll look through what's been recorded." },
  ]);
  const [input, setInput] = useState("");

  const send = () => {
    const text = input.trim();
    if (!text) return;
    let reply;
    const real = (conversations || []).filter((c) => c.transcript && !c.live);

    if (real.length === 0) {
      reply = "No conversations recorded yet. Start a recording session and I'll be able to reflect on what was said.";
    } else {
      const lower = text.toLowerCase();
      const keywords = lower.split(/\s+/).filter((w) => w.length > 3);

      // Score each conversation by keyword hits in transcript
      const scored = real.map((c) => {
        const t = (c.transcript || "").toLowerCase();
        const score = keywords.reduce((n, kw) => n + (t.includes(kw) ? 1 : 0), 0);
        return { c, score };
      }).filter((x) => x.score > 0).sort((a, b) => b.score - a.score);

      if (scored.length > 0) {
        const { c } = scored[0];
        // Find the most relevant sentence
        const sentences = c.transcript.split(/[.!?]+/).map((s) => s.trim()).filter(Boolean);
        const best = sentences.find((s) =>
          keywords.some((kw) => s.toLowerCase().includes(kw))
        ) || sentences[0];
        reply = `From your recording "${c.title}" (${c.date}):\n\n"${best}"\n\nFull transcript: ${c.transcript.slice(0, 300)}${c.transcript.length > 300 ? "..." : ""}`;
      } else {
        // No keyword match — summarize what's there
        const allText = real.map((c) => c.transcript).join(" ");
        const preview = allText.slice(0, 400);
        reply = `I didn't find that specific topic, but here's what I have from your recordings:\n\n"${preview}${allText.length > 400 ? "..." : ""}"`;
      }
    }
    setMessages((m) => [...m, { from: "user", text }, { from: "ai", text: reply }]);
    setInput("");
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.65)", backdropFilter: "blur(4px)", padding: "16px" }}>
      <div style={{ position: "relative", width: "100%", maxWidth: "440px", height: "min(640px, 85vh)", borderRadius: "24px", border: "1px solid #2E2440", background: "#0E0B16", boxShadow: "0 0 80px rgba(155,127,224,0.18)", display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 20px 12px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
            <Icon.MessageCircle style={{ width: 16, height: 16, color: "#C9A8F0" }} />
            <span style={{ fontSize: "12px", fontWeight: 500, letterSpacing: "0.2em", color: "#9B7FE0", textTransform: "uppercase" }}>Clarity AI</span>
          </div>
          <button onClick={onClose} style={{ color: "#8C7FA8", background: "none", border: "none", cursor: "pointer" }}>
            <Icon.X style={{ width: 18, height: 18 }} />
          </button>
        </div>

        <div style={{ flex: 1, overflowY: "auto", padding: "0 20px", display: "flex", flexDirection: "column", gap: "10px" }}>
          {messages.map((m, i) => (
            <div key={i} style={{
              alignSelf: m.from === "user" ? "flex-end" : "flex-start",
              maxWidth: "85%",
              borderRadius: "14px",
              padding: "12px 14px",
              fontSize: "14px",
              lineHeight: 1.5,
              background: m.from === "user" ? "rgba(155,127,224,0.18)" : "rgba(255,255,255,0.04)",
              border: m.from === "user" ? "1px solid rgba(155,127,224,0.35)" : "1px solid rgba(255,255,255,0.06)",
              color: m.from === "user" ? "#F3EEFF" : "#E5DEF5",
            }}>
              {m.text}
            </div>
          ))}
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "16px 20px 20px" }}>
          <input
            value={input}
            onChange={(e) => setInput(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") send(); }}
            placeholder="Ask about a past conversation..."
            style={{
              flex: 1, borderRadius: "14px", border: "1px solid rgba(255,255,255,0.1)",
              background: "rgba(255,255,255,0.03)", padding: "12px 14px",
              fontSize: "14px", color: "#FFFFFF", outline: "none", fontFamily: "inherit",
            }}
            onFocus={(e) => { e.target.style.borderColor = "rgba(155,127,224,0.6)"; }}
            onBlur={(e) => { e.target.style.borderColor = "rgba(255,255,255,0.1)"; }}
          />
          <button onClick={send} aria-label="Send" style={{
            width: "42px", height: "42px", borderRadius: "12px", flexShrink: 0,
            border: "1px solid rgba(155,127,224,0.5)", background: "rgba(155,127,224,0.15)",
            display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
          }}>
            <Icon.Send style={{ width: 16, height: 16, color: "#C9A8F0" }} />
          </button>
        </div>

        <p style={{ fontSize: "11px", color: "#8478A0", textAlign: "center", margin: "0 20px 16px", lineHeight: 1.4 }}>
          Clarity reflects patterns from your own recorded conversations — it isn't a therapist.
        </p>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// LIVE TRANSCRIPT — shows the 5 most recently heard words while recording
// ---------------------------------------------------------------------------

const MOCK_WORD_STREAM =
  "so I was thinking about the weekend and maybe we could just stay in and relax for once instead of running around the whole time".split(" ");

function LiveTranscript({ recording, onChunk }) {
  const [words, setWords] = useState([]);
  const [micError, setMicError] = useState(null);
  const recognitionRef = React.useRef(null);
  const activeRef = React.useRef(false);
  const mockIndexRef = React.useRef(0);
  const mockTimerRef = React.useRef(null);

  const pushWords = (text, isFinal) => {
    const newWords = text.trim().split(/\s+/).filter(Boolean);
    if (newWords.length === 0) return;
    setWords((prev) => [...prev, ...newWords].slice(-5));
    if (isFinal && onChunk) onChunk(text.trim());
  };

  React.useEffect(() => {
    if (!recording) {
      activeRef.current = false;
      setWords([]);
      setMicError(null);
      if (recognitionRef.current) {
        try { recognitionRef.current.onend = null; recognitionRef.current.stop(); } catch(e) {}
        recognitionRef.current = null;
      }
      if (mockTimerRef.current) {
        clearInterval(mockTimerRef.current);
        mockTimerRef.current = null;
      }
      mockIndexRef.current = 0;
      return;
    }

    activeRef.current = true;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      const startRecognition = () => {
        if (!activeRef.current) return;
        const recognition = new SpeechRecognition();
        recognition.continuous = false; // more reliable on mobile
        recognition.interimResults = true;
        recognition.lang = "en-US";
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
          let interim = "", final = "";
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const t = event.results[i][0].transcript;
            if (event.results[i].isFinal) final += t + " ";
            else interim += t + " ";
          }
          if (final) pushWords(final, true);
          else if (interim) pushWords(interim, false);
        };

        recognition.onerror = (event) => {
          if (event.error === "not-allowed" || event.error === "service-not-allowed") {
            activeRef.current = false;
            setMicError("Microphone access denied — check browser permissions and reload.");
            startMockStream();
          }
          // other errors: restart will happen via onend
        };

        recognition.onend = () => {
          if (activeRef.current) {
            setTimeout(startRecognition, 150);
          }
        };

        try {
          recognition.start();
          recognitionRef.current = recognition;
        } catch (e) {
          if (activeRef.current) setTimeout(startRecognition, 500);
        }
      };

      startRecognition();
    } else {
      setMicError("Live transcription isn't supported in this browser — showing sample audio.");
      startMockStream();
    }

    function startMockStream() {
      mockTimerRef.current = setInterval(() => {
        const w = MOCK_WORD_STREAM[mockIndexRef.current % MOCK_WORD_STREAM.length];
        mockIndexRef.current += 1;
        setWords((prev) => [...prev, w].slice(-5));
      }, 420);
    }

    return () => {
      activeRef.current = false;
      if (recognitionRef.current) {
        try { recognitionRef.current.onend = null; recognitionRef.current.stop(); } catch(e) {}
        recognitionRef.current = null;
      }
      if (mockTimerRef.current) {
        clearInterval(mockTimerRef.current);
        mockTimerRef.current = null;
      }
    };
  }, [recording]);

  if (!recording) return null;

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "6px", minHeight: "44px" }}>
      <div style={{ display: "flex", flexWrap: "wrap", justifyContent: "center", gap: "8px", maxWidth: "320px" }}>
        {words.length === 0 && (
          <span style={{ fontSize: "13px", color: "#6F6285" }}>Listening...</span>
        )}
        {words.map((w, i) => (
          <span key={i} style={{
            fontSize: "14px", color: "#E5DEF5",
            opacity: 0.35 + (i / Math.max(words.length - 1, 1)) * 0.65,
            animation: "fadeInUp 0.35s ease-out",
          }}>
            {w}
          </span>
        ))}
      </div>
      {micError && (
        <span style={{ fontSize: "11px", color: "#8478A0", textAlign: "center", maxWidth: "300px" }}>{micError}</span>
      )}
    </div>
  );
}

function App() {
  const [connected, setConnected] = useState(false);
  const [connectedDevices, setConnectedDevices] = useState([]);
  const [recording, setRecording] = useState(false);
  const [showSubscription, setShowSubscription] = useState(false);
  const [showLearn, setShowLearn] = useState(false);
  const [showBluetooth, setShowBluetooth] = useState(false);
  const [showAsk, setShowAsk] = useState(false);
  const [query, setQuery] = useState("");
  const [conversations, setConversations] = useState(() => loadConversations());
  const currentTranscriptRef = React.useRef("");
  const currentSessionIdRef = React.useRef(null);
  const activeDeviceRef = React.useRef(null);

  // Use real conversations if any exist, otherwise show mock examples
  const displayConversations = conversations.length > 0 ? conversations : MOCK_CONVERSATIONS;

  const results = displayConversations.filter(
    (c) =>
      c.title.toLowerCase().includes(query.toLowerCase()) ||
      c.theme.toLowerCase().includes(query.toLowerCase()) ||
      (c.snippet || "").toLowerCase().includes(query.toLowerCase()) ||
      (c.transcript || "").toLowerCase().includes(query.toLowerCase())
  );

  // Start a new live session in the list
  const startSession = (device) => {
    const id = Date.now();
    currentSessionIdRef.current = id;
    currentTranscriptRef.current = "";
    const now = new Date();
    const session = {
      id,
      title: "Recording...",
      date: now.toLocaleString("en-US", { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }),
      room: device?.name || "Phone Microphone",
      theme: "recorded",
      tone: "calm",
      snippet: "Listening...",
      transcript: "",
      live: true,
    };
    setConversations((prev) => [session, ...prev]);
  };

  // Called on every finalized speech chunk — updates the live session immediately
  const handleChunk = (text) => {
    currentTranscriptRef.current += (currentTranscriptRef.current ? " " : "") + text;
    const transcript = currentTranscriptRef.current;
    const words = transcript.split(/\s+/);
    const title = words.slice(0, 6).join(" ") + (words.length > 6 ? "..." : "");
    const snippet = "..." + transcript.slice(0, 140);

    setConversations((prev) => {
      const next = prev.map((c) =>
        c.id === currentSessionIdRef.current
          ? { ...c, title, snippet, transcript, live: true }
          : c
      );
      // Persist completed sessions only (not the live one)
      saveConversations(next.filter((c) => !c.live));
      return next;
    });
  };

  // Finalize the live session when recording stops
  const finalizeSession = () => {
    const transcript = currentTranscriptRef.current.trim();
    currentTranscriptRef.current = "";
    const id = currentSessionIdRef.current;
    currentSessionIdRef.current = null;

    setConversations((prev) => {
      const next = prev
        .map((c) => {
          if (c.id !== id) return c;
          if (!transcript) return null; // drop empty sessions
          const lower = transcript.toLowerCase();
          const tone = /angry|upset|frustrat|annoyed|stressed|tense/.test(lower) ? "tense"
            : /happy|great|love|wonderful|excited|amazing/.test(lower) ? "warm"
            : "calm";
          return { ...c, tone, live: false };
        })
        .filter(Boolean);
      saveConversations(next.filter((c) => !c.live));
      return next;
    });
  };

  const handleRecordClick = () => {
    if (!connected) { setShowBluetooth(true); return; }
    if (recording) {
      finalizeSession();
      setRecording(false);
    } else {
      startSession(activeDeviceRef.current);
      setRecording(true);
    }
  };

  const handleConnect = (device) => {
    activeDeviceRef.current = device;
    setConnected(true);
    setConnectedDevices((prev) => prev.some((d) => d.id === device.id) ? prev : [...prev, device]);
    setShowBluetooth(false);
    startSession(device);
    setRecording(true);
  };

  const handleUnpair = (deviceId) => {
    if (recording) finalizeSession();
    setConnectedDevices((prev) => {
      const next = prev.filter((d) => d.id !== deviceId);
      if (next.length === 0) {
        setConnected(false);
        setRecording(false);
        activeDeviceRef.current = null;
      }
      return next;
    });
  };

  const handleClearHistory = () => {
    if (!window.confirm("Delete all recorded conversations?")) return;
    setConversations([]);
    saveConversations([]);
  };

  return (
    <div style={{
      position: "relative", minHeight: "100vh", overflow: "hidden",
      background: "#06050A",
      fontFamily: "system-ui, -apple-system, sans-serif",
    }}>
      {/* Ambient purple orb glows in background */}
      <div style={{
        position: "absolute", top: "-220px", left: "50%", transform: "translateX(-50%)",
        width: "900px", height: "900px", borderRadius: "50%",
        background: "radial-gradient(circle, rgba(155,127,224,0.35) 0%, rgba(107,78,158,0.18) 40%, transparent 72%)",
        filter: "blur(50px)", pointerEvents: "none",
        animation: "driftGlow1 14s ease-in-out infinite",
      }} />
      <div style={{
        position: "absolute", bottom: "-300px", left: "50%", transform: "translateX(-50%)",
        width: "760px", height: "760px", borderRadius: "50%",
        background: "radial-gradient(circle, rgba(123,92,179,0.25) 0%, transparent 70%)",
        filter: "blur(55px)", pointerEvents: "none",
        animation: "driftGlow2 17s ease-in-out infinite",
      }} />

      <div style={{ position: "relative", zIndex: 1, maxWidth: "440px", margin: "0 auto", padding: "32px 20px", display: "flex", flexDirection: "column", gap: "28px" }}>

        <header style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingTop: "8px" }}>
          <h1 style={{
            fontSize: "26px", fontWeight: 600, letterSpacing: "0.08em",
            margin: 0, color: "rgba(238,232,250,0.9)",
            textShadow: "0 0 22px rgba(155,127,224,0.65), 0 0 48px rgba(155,127,224,0.3)",
          }}>
            Reflect AI
          </h1>
        </header>

        <div style={{ display: "flex", justifyContent: "center", padding: "12px 0" }}>
          <RecordButton recording={recording} connected={connected} onClick={handleRecordClick} />
        </div>

        <LiveTranscript recording={recording} onChunk={handleChunk} />

        <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
          <ControlButton
            icon={Icon.MessageCircle}
            label="Ask a question"
            onClick={() => setShowAsk(true)}
            active={false}
          />
          <ControlButton
            icon={Icon.Sparkles}
            label="Learn from yourself"
            onClick={() => setShowLearn(true)}
            active={false}
          />
        </div>

        <div style={{ height: "1px", background: "linear-gradient(to right, transparent, rgba(255,255,255,0.12), transparent)" }} />

        <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
          <h2 style={{ fontSize: "14px", fontWeight: 500, color: "#E5DEF5", letterSpacing: "0.02em", padding: "0 4px", margin: 0 }}>Recorded conversations</h2>
          <SearchConsole query={query} setQuery={setQuery} results={results} />
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
          <button onClick={() => setShowSubscription(true)} style={{
            width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: "10px",
            borderRadius: "16px", border: "1px solid rgba(155,127,224,0.4)",
            background: "rgba(155,127,224,0.1)", backdropFilter: "blur(6px)",
            color: "#FFFFFF", fontSize: "14px", fontWeight: 500, padding: "16px",
            cursor: "pointer", fontFamily: "inherit", boxShadow: "0 0 20px rgba(155,127,224,0.15)",
          }}>
            <Icon.Crown style={{ width: 18, height: 18, color: "#C9A8F0" }} />
            Manage subscription
          </button>

          <button style={{
            width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: "10px",
            borderRadius: "16px", border: "1px solid rgba(255,255,255,0.1)",
            background: "rgba(255,255,255,0.04)", backdropFilter: "blur(6px)",
            color: "#E5DEF5", fontSize: "14px", fontWeight: 500, padding: "16px",
            cursor: "pointer", fontFamily: "inherit",
          }}>
            <Icon.Google style={{ width: 18, height: 18 }} />
            Sign in with Google
          </button>
        </div>

        <PrivacyStrip onClear={handleClearHistory} />
      </div>

      {showBluetooth && <BluetoothPanel onClose={() => setShowBluetooth(false)} onConnect={handleConnect} />}
      {showLearn && <LearnPanel onClose={() => setShowLearn(false)} />}
      {showSubscription && <SubscriptionPanel onClose={() => setShowSubscription(false)} connectedDevices={connectedDevices} onUnpair={handleUnpair} />}
      {showAsk && <AskQuestionPanel onClose={() => setShowAsk(false)} conversations={conversations} />}

      <style>{`
        @keyframes ringExpand {
          0% { transform: scale(1); opacity: 0.7; }
          100% { transform: scale(1.6); opacity: 0; }
        }
        @keyframes pulseRed {
          0%, 100% { box-shadow: 0 0 0 1px rgba(224,107,107,0.4), 0 0 36px rgba(224,107,107,0.35); }
          50% { box-shadow: 0 0 0 1px rgba(224,107,107,0.6), 0 0 56px rgba(224,107,107,0.55); }
        }
        @keyframes driftGlow1 {
          0%   { transform: translate(-50%, 0) scale(1); }
          25%  { transform: translate(-25%, 120px) scale(1.12); }
          50%  { transform: translate(-65%, 220px) scale(0.92); }
          75%  { transform: translate(-35%, 100px) scale(1.08); }
          100% { transform: translate(-50%, 0) scale(1); }
        }
        @keyframes driftGlow2 {
          0%   { transform: translate(-50%, 0) scale(1); }
          25%  { transform: translate(-75%, -120px) scale(1.1); }
          50%  { transform: translate(-35%, -220px) scale(0.9); }
          75%  { transform: translate(-65%, -100px) scale(1.06); }
          100% { transform: translate(-50%, 0) scale(1); }
        }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
